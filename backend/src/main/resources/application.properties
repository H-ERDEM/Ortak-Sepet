# Active Profile
spring.profiles.active=local

# Veritaban? Ayarlar?
spring.datasource.url=jdbc:postgresql://localhost:5432/ortaksepet
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# Hibernate - Tabloları otomatik oluştur
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Google OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=https://www.googleapis.com/auth/gmail.readonly,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent

# Playwright Configuration
playwright.headless=${PLAYWRIGHT_HEADLESS:true}

# Price Alarm Scheduler Rate (default: every 6 hours)
price.alarm.cron=${PRICE_ALARM_CRON:0 0 */6 * * *}

# SerpApi Google Shopping API key. Prefer setting SERPAPI_API_KEY as an environment variable.
serpapi.api.key=${SERPAPI_API_KEY:}
